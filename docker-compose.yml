version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: eims-postgres
    environment:
      POSTGRES_DB: eimsdata
      POSTGRES_USER: eims
      POSTGRES_PASSWORD: eims_password_secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eims"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eims-network

  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eims-app
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=eimsdata
      - DB_USERNAME=eims
      - DB_PASSWORD=eims_password_secure
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - .:/app
    networks:
      - eims-network
    command: php-fpm

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: eims-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - eims-network

  # Redis (Optional - for caching/sessions if needed)
  redis:
    image: redis:7-alpine
    container_name: eims-redis
    ports:
      - "6379:6379"
    networks:
      - eims-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  eims-network:
    driver: bridge
