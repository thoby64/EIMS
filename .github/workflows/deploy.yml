name: Deploy to Render

on:
  push:
    branches: [main, production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Render
      run: |
        curl https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }} \
          -X POST
    
    - name: Wait for deployment
      run: sleep 10
    
    - name: Run migrations
      run: |
        echo "Deployment triggered. Render will automatically run migrations."

  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eimsdata
          POSTGRES_USER: eims
          POSTGRES_PASSWORD: eims_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: pdo, pdo_pgsql, zip, pcntl
    
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader
    
    - name: Install Node dependencies
      run: npm ci --omit=dev
    
    - name: Generate app key
      run: php artisan key:generate
      env:
        APP_ENV: testing
    
    - name: Build frontend
      run: npm run build
    
    - name: Run migrations
      run: php artisan migrate
      env:
        DB_CONNECTION: pgsql
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: eimsdata
        DB_USERNAME: eims
        DB_PASSWORD: eims_password
    
    - name: Run tests
      run: php artisan test
      env:
        DB_CONNECTION: pgsql
        DB_HOST: localhost
        DB_PORT: 5432
        DB_DATABASE: eimsdata
        DB_USERNAME: eims
        DB_PASSWORD: eims_password
