<VirtualHost *:${PORT}>

    ServerName localhost

    DocumentRoot /var/www/html/public

    # Trust X-Forwarded-Proto header from Render proxy
    <IfModule mod_remoteip.c>
        RemoteIPHeader X-Forwarded-For
        RemoteIPInternalProxy 10.0.0.0/8
        RemoteIPInternalProxy 172.16.0.0/12
        RemoteIPInternalProxy 192.168.0.0/16
    </IfModule>

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options +FollowSymLinks -MultiViews
        DirectoryIndex index.php
        
        # Enable mod_rewrite for Laravel routing
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.php [QSA,L]
        </IfModule>
    </Directory>

    # Allow access to build directory with proper caching
    <Directory /var/www/html/public/build>
        AllowOverride All
        Require all granted
        Options +FollowSymLinks
        ExpiresActive On
        ExpiresDefault "access plus 30 days"
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    # Static assets caching
    <FilesMatch "\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
    </FilesMatch>

    # Security headers - allow self-hosted assets
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "no-referrer-when-downgrade"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.googleapis.com fonts.googleapis.com; font-src 'self' data: fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self';"

    # Enable gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
        DeflateCompressionLevel 9
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>

