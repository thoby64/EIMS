services:
  # PostgreSQL Database Service
  - type: pserv
    name: eims-postgres
    runtime: image
    image:
      fromRegistry:
        url: postgres:16-alpine
    envVars:
      - key: POSTGRES_DB
        value: eimsdata
      - key: POSTGRES_USER
        value: eims
      - key: POSTGRES_PASSWORD
        generateValue: true
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # Laravel Application Service
  - type: web
    name: eims-app
    runtime: docker
    plan: standard
    buildCommand: |
      composer install --no-dev --optimize-autoloader --no-interaction && \
      npm ci && \
      npm run build && \
      php artisan config:cache
    startCommand: |
      php artisan migrate --force --no-interaction || true; \
      php artisan db:seed --class=MigrateDataFromMySQLSeeder --force --no-interaction || true
    envVars:
      - key: APP_NAME
        value: EIMS
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: eims-app
          property: url
      - key: ASSET_URL
        fromService:
          type: web
          name: eims-app
          property: url
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          type: pserv
          name: eims-postgres
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: eims-postgres
          property: port
      - key: DB_DATABASE
        value: eimsdata
      - key: DB_USERNAME
        value: eims
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: eims-postgres
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: file
      - key: FILESYSTEM_DISK
        value: local
    healthCheckPath: /
    healthCheckStartupFailureThreshold: 10
    headers:
      - http:
          paths:
            - path: /
              methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
              middlewares:
                - name: add-response-headers
                  responseHeaders:
                    - name: X-Frame-Options
                      value: SAMEORIGIN
                    - name: X-Content-Type-Options
                      value: nosniff
                    - name: X-XSS-Protection
                      value: "1; mode=block"

databases:
  - name: eims-postgres
    plan: standard
    ipAllowList: []

staticSites:
  - name: eims-assets
    staticPublishPath: ./public
    pullRequestPreviewsEnabled: true
